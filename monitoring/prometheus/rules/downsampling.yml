  - name: custom_api_metrics_5m
    interval: 5m
    rules:
      # API 호출 증가량 (5분)
      - record: announcement_find:5m:increase
        expr: increase(announcement_find_total[5m]) or vector(0)
        labels:
          aggregation: "5m"

      - record: complaint_save:5m:increase
        expr: increase(complaint_save_total[5m]) or vector(0)
        labels:
          aggregation: "5m"

      - record: roommate_chatting_send:5m:increase
        expr: increase(roommate_chatting_send_total[5m]) or vector(0)
        labels:
          aggregation: "5m"

      - record: survey_find:5m:increase
        expr: increase(survey_find_total[5m]) or vector(0)
        labels:
          aggregation: "5m"

      - record: tip_find:5m:increase
        expr: increase(tip_find_total[5m]) or vector(0)
        labels:
          aggregation: "5m"

      - record: user_save:5m:increase
        expr: increase(user_save_total[5m]) or vector(0)
        labels:
          aggregation: "5m"

      - record: roommate_save:5m:increase
        expr: increase(roommate_save_total[5m]) or vector(0)
        labels:
          aggregation: "5m"

      - record: roommate_request:5m:increase
        expr: increase(roommate_request_total[5m]) or vector(0)
        labels:
          aggregation: "5m"
