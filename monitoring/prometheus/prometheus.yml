global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'dormitory-app'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Load recording and alert rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # Spring Boot Application 메트릭 수집
  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'dormitory-app'
          instance: 'app-1'

  # Prometheus 자체 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter 메트릭 (서버 시스템 리소스)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'server-1'
          host: 'dormitory-server'

# 원격 쓰기 설정 (필요시 Thanos, Cortex 등과 연동)
